services:
  # Backend - Spring Boot API
  - type: web
    name: camarmo-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: camarmo-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: camarmo-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: camarmo-db
          property: password
      - key: FRONTEND_URL
        value: https://camarmo.onrender.com
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: JESTOR_API_URL
        sync: false
      - key: JESTOR_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Frontend - React Static Site
  - type: web
    name: camarmo
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://camarmo-api.onrender.com/api/v1

databases:
  - name: camarmo-db
    plan: free
    databaseName: camarmo
