# Render.com Deployment Profile

# PostgreSQL (Render provides individual DB properties)
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console in production
spring.h2.console.enabled=false

# Server port (Render sets PORT env var)
server.port=${PORT:8080}

# File uploads (ephemeral on Render free tier)
app.upload.directory=/tmp/uploads
app.upload.base-url=${RENDER_EXTERNAL_URL:http://localhost:8080}/uploads

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
