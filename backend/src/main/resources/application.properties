# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# SQL Script initialization
spring.sql.init.mode=never

# Server
server.port=8080

# ChatGPT Configuration
chatgpt.api.url=https://api.openai.com
chatgpt.api.key=${OPENAI_API_KEY:your-openai-api-key-here}
chatgpt.model=gpt-4
chatgpt.max-tokens=4000
chatgpt.temperature=0.7

# File Upload Configuration
app.upload.directory=uploads
app.upload.base-url=http://localhost:8080/uploads

# Spring Boot file upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB