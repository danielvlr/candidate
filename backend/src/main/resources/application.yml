server:
  port: 8081

spring:
  application:
    name: sistema-banco-talentos

  datasource:
    url: jdbc:h2:mem:talentbank
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jestor:
  api-url: ${JESTOR_API_URL:}
  api-token: ${JESTOR_API_TOKEN:}
  sync-cron: ${JESTOR_SYNC_CRON:0 */30 * * * *}
  jobs-table: ${JESTOR_JOBS_TABLE:}
  clients-table: ${JESTOR_CLIENTS_TABLE:}
  candidates-table: ${JESTOR_CANDIDATES_TABLE:}
  headhunters-table: ${JESTOR_HEADHUNTERS_TABLE:}

warranty:
  notification:
    cron: "0 0 8 * * MON-FRI"
    days-before: 10
  expiration:
    cron: "0 0 0 * * *"