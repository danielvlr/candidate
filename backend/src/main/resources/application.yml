server:
  port: 8081

spring:
  application:
    name: sistema-banco-talentos

  datasource:
    url: jdbc:h2:mem:talentbank
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jestor:
  api-url: ${JESTOR_API_URL:https://b13f0dd1a22d45898b1b79eed549be20.api.jestor.com}
  api-token: ${JESTOR_API_TOKEN:MThkNTA1NTEwNmU0Zjdh5a84fa96c6MTcyNjY2ODY5MWZhNzkw}
  sync-cron: ${JESTOR_SYNC_CRON:0 */30 * * * *}
  jobs-table: ${JESTOR_JOBS_TABLE:1qsbzdrzg3ca0srnvins_}
